services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume_web
    volumes:
      - ./localhost-cert.pem:/app/cert.pem:ro
      - ./localhost-key.pem:/app/key.pem:ro
    command: >
      hypercorn main:app
        --bind 0.0.0.0:8000
        --workers 2
        --worker-class asyncio
    ports:
      - '8000:8000'
    environment:
      - REDIS_URL=redis://default:IOcncAj6PRAtCO5BlFtzjtwK0JIASbQs@redis-17014.c84.us-east-1-2.ec2.redns.redis-cloud.com:17014
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    env_file:
      - .env
    restart: always

  # Scale workers horizontally for better performance
  worker-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume_worker_1
    command: celery -A src.celery_config.celery_app worker --loglevel=info --pool=threads --concurrency=10 --queues=resume_analysis,resume_structuring --hostname=worker1@%h
    environment:
      - REDIS_URL=redis://default:IOcncAj6PRAtCO5BlFtzjtwK0JIASbQs@redis-17014.c84.us-east-1-2.ec2.redns.redis-cloud.com:17014
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    env_file:
      - .env
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  worker-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume_worker_2
    command: celery -A src.celery_config.celery_app worker --loglevel=info --pool=threads --concurrency=10 --queues=resume_analysis,resume_structuring --hostname=worker2@%h
    environment:
      - REDIS_URL=redis://default:IOcncAj6PRAtCO5BlFtzjtwK0JIASbQs@redis-17014.c84.us-east-1-2.ec2.redns.redis-cloud.com:17014
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    env_file:
      - .env
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Optional: Add flower for monitoring (remove in production)
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume_flower
    command: celery -A src.celery_config.celery_app flower --port=5555
    ports:
      - '5555:5555'
    environment:
      - REDIS_URL=redis://default:IOcncAj6PRAtCO5BlFtzjtwK0JIASbQs@redis-17014.c84.us-east-1-2.ec2.redns.redis-cloud.com:17014
    env_file:
      - .env
    restart: always
    profiles:
      - monitoring